<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="每日打卡" />
    <title>每日打卡</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/icon.svg.png" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="todayLabel">今天</p>
          <h1>每日完成事项</h1>
        </div>
        <div class="score" aria-label="今日完成率">
          <span id="scoreValue">0%</span>
          <small>完成率</small>
        </div>
      </header>

      <section class="summary-grid" aria-label="今日概览">
        <article class="metric">
          <span id="doneCount">0</span>
          <p>已完成</p>
        </article>
        <article class="metric">
          <span id="totalCount">0</span>
          <p>总事项</p>
        </article>
        <article class="metric">
          <span id="streakCount">0</span>
          <p>连续天数</p>
        </article>
      </section>

      <nav class="tabs" aria-label="视图切换">
        <button class="tab is-active" type="button" data-tab="today">今日</button>
        <button class="tab" type="button" data-tab="history">历史</button>
        <button class="tab" type="button" data-tab="manage">管理</button>
      </nav>

      <section class="panel is-active" id="todayPanel" aria-labelledby="todayTab">
        <div class="section-head">
          <h2>今日事项</h2>
          <button class="icon-button" type="button" id="resetTodayButton" title="重置今日打卡" aria-label="重置今日打卡">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7" />
              <path d="M3 3v6h6" />
            </svg>
          </button>
        </div>
        <div class="task-list" id="taskList"></div>
      </section>

      <section class="panel" id="historyPanel" aria-labelledby="historyTab">
        <div class="section-head">
          <h2>最近记录</h2>
          <button class="icon-button" type="button" id="exportButton" title="导出数据" aria-label="导出数据">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="M7 10l5 5 5-5" />
              <path d="M12 15V3" />
            </svg>
          </button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>

      <section class="panel" id="managePanel" aria-labelledby="manageTab">
        <div class="section-head">
          <h2>事项管理</h2>
        </div>
        <form class="task-form" id="taskForm">
          <input type="hidden" id="taskId" />
          <label>
            <span>时间</span>
            <input id="taskTime" type="time" required />
          </label>
          <label>
            <span>动作</span>
            <input id="taskAction" type="text" placeholder="起床" required maxlength="32" />
          </label>
          <label>
            <span>完成标准</span>
            <input id="taskStandard" type="text" placeholder="09:30前" required maxlength="48" />
          </label>
          <div class="form-actions">
            <button class="primary-button" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z" />
                <path d="M17 21v-8H7v8" />
                <path d="M7 3v5h8" />
              </svg>
              保存事项
            </button>
            <button class="secondary-button" type="button" id="clearFormButton">清空</button>
          </div>
        </form>
        <div class="manage-list" id="manageList"></div>
      </section>
    </main>

    <template id="taskTemplate">
      <article class="task-card">
        <div class="task-main">
          <time></time>
          <div>
            <h3></h3>
            <p></p>
          </div>
        </div>
        <button class="check-button" type="button"></button>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
